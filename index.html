<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdaptForm Test</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px }
    label { display: block; margin-top: 10px }
    input { padding: 5px; margin-top: 5px; width: 200px }
    .error { color: red; font-size: 0.9em }
    .output { margin-top: 20px; background: #f5f5f5; padding: 10px; border: 1px solid #ccc }
  </style>
</head>
<body>
  <h1>AdaptForm Test Page</h1>

  <form id="testForm">
    <label>
      Name:
      <input type="text" id="name">
      <span class="error" id="nameError"></span>
    </label>

    <label>
      Age:
      <input type="number" id="age">
      <span class="error" id="ageError"></span>
    </label>

    <label>
      Birthday:
      <input type="date" id="birthday">
      <span class="error" id="birthdayError"></span>
    </label>

    <label>
      Meeting Date & Time:
      <input type="datetime-local" id="meeting">
      <span class="error" id="meetingError"></span>
    </label>

    <button type="button" id="checkBtn">Check Form</button>
  </form>

  <div class="output">
    <h3>Form Values</h3>
    <pre id="formValues"></pre>
    <h3>Form Errors</h3>
    <pre id="formErrors"></pre>
  </div>

  <script type="module">
    import {DateTimeField, Form, NumberField, StringField} from './src/index.ts'

    class TestForm extends Form {
      name = new StringField('', { minLength: 2, maxLength: 20, example: 'John Doe' })
      age = new NumberField(null, { min: 1, max: 120, example: '25' })
      birthday = new DateTimeField(null, {mode: "date"})
      meeting = new DateTimeField(null)
    }

    const form = new TestForm()

    // inputs
    const nameInput = document.getElementById('name')
    const ageInput = document.getElementById('age')
    const birthdayInput = document.getElementById('birthday')
    const meetingInput = document.getElementById('meeting')

    const nameError = document.getElementById('nameError')
    const ageError = document.getElementById('ageError')
    const birthdayError = document.getElementById('birthdayError')
    const meetingError = document.getElementById('meetingError')

    const formValuesEl = document.getElementById('formValues')
    const formErrorsEl = document.getElementById('formErrors')

    // bind inputs to form fields
    nameInput.addEventListener('input', (e) => form.name.value = e.target.value)
    ageInput.addEventListener('input', (e) => form.age.value = e.target.value)
    birthdayInput.addEventListener('input', (e) => form.birthday.value = e.target.value)
    meetingInput.addEventListener('input', (e) => form.meeting.value = e.target.value)

    document.getElementById('checkBtn').addEventListener('click', () => {
      const valid = form.checkValid()

      // update error messages
      nameError.textContent = form.name.error
      ageError.textContent = form.age.error
      birthdayError.textContent = form.birthday.error
      meetingError.textContent = form.meeting.error

      // show form values and errors
      formValuesEl.textContent = JSON.stringify(form.valueObject, null, 2)
      const errors = {}
      form.declaredFields.forEach(key => {
        const f = form[key]
        if (f instanceof Object && 'error' in f && f.error) errors[key] = f.error
      })
      formErrorsEl.textContent = JSON.stringify(errors, null, 2)

      alert(valid ? 'Form is valid!' : 'Form has errors!')
    })
  </script>
</body>
</html>
